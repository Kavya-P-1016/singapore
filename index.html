<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>

  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TripDocs" />
  <meta name="format-detection" content="telephone=no" />
  <title>Travel Document Organizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
            surface: { light: '#f8fafc', dark: '#0f172a', card: '#ffffff', 'card-dark': '#1e293b' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          boxShadow: {
            card: '0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04)',
            'card-dark': '0 1px 3px rgba(0,0,0,.2), 0 8px 24px rgba(0,0,0,.25)',
            glow: '0 0 40px rgba(59,130,246,.15)'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-x: hidden;
    }
    body {
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }
    [x-cloak] { display: none !important; }
    .safe-bottom { padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0)); }
    .safe-top { padding-top: env(safe-area-inset-top, 0); }
    @media (max-width: 1023px) {
      .main-scroll {
        padding-bottom: calc(4.75rem + env(safe-area-inset-bottom, 0px));
        -webkit-overflow-scrolling: touch;
      }
    }
    .mobile-nav-inner {
      min-height: 3.75rem;
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0px));
    }
    .nav-item {
      min-height: 3rem;
      min-width: 3rem;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .nav-item.active {
      color: rgb(37 99 235);
      background: rgb(239 246 255);
    }
    .dark .nav-item.active {
      color: rgb(96 165 250);
      background: rgb(30 58 138 / 0.35);
    }
    .nav-item.active .nav-dot { opacity: 1; transform: scale(1); }
    .nav-dot {
      width: 4px;
      height: 4px;
      border-radius: 9999px;
      background: currentColor;
      opacity: 0;
      transform: scale(0);
      transition: opacity .2s, transform .2s;
    }
    .sidebar-item.active {
      background: linear-gradient(135deg, rgb(37 99 235), rgb(29 78 216));
      color: white;
      box-shadow: 0 4px 14px rgba(37,99,235,.35);
    }
    .card-hover { transition: transform .2s ease, box-shadow .2s ease; }
    @media (hover: hover) and (pointer: fine) {
      .card-hover:hover { transform: translateY(-2px); }
    }
    .touch-btn {
      min-height: 2.75rem;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .touch-btn:active { transform: scale(0.98); opacity: 0.92; }
    .mobile-input { font-size: 1rem; }
    @media (min-width: 640px) {
      .mobile-input { font-size: 0.875rem; }
    }
    .pills-scroll {
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .pills-scroll::-webkit-scrollbar { display: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn .35s ease forwards; }
    .modal-backdrop { backdrop-filter: blur(8px); }
    @media (max-width: 639px) {
      .edit-sheet { align-items: flex-end !important; padding: 0 !important; }
      .edit-sheet-panel {
        max-height: 92vh;
        border-radius: 1.25rem 1.25rem 0 0;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
    }
  </style>
</head>
<body class="font-sans bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 antialiased transition-colors duration-300">

  <!-- App Shell -->
  <div id="app" class="min-h-screen flex">

    <!-- Desktop Sidebar -->
    <aside id="sidebar" class="hidden lg:flex lg:flex-col w-64 xl:w-72 shrink-0 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 safe-top">
      <div class="p-6 border-b border-slate-100 dark:border-slate-800">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-glow">
            <i data-lucide="plane" class="w-5 h-5 text-white"></i>
          </div>
          <div>
            <h1 class="font-bold text-lg leading-tight">TripDocs</h1>
            <p class="text-xs text-slate-500 dark:text-slate-400">Patel Family · Jun 2026</p>
          </div>
        </div>
      </div>
      <nav id="desktop-nav" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
      <div class="p-4 border-t border-slate-100 dark:border-slate-800">
        <button id="theme-toggle-desktop" type="button" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
          <i data-lucide="moon" class="w-5 h-5 theme-icon-dark"></i>
          <i data-lucide="sun" class="w-5 h-5 theme-icon-light hidden"></i>
          <span class="theme-label">Dark mode</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- Header -->
      <header class="sticky top-0 z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800/80 safe-top">
        <div class="px-4 sm:px-6 lg:px-8 py-3 sm:py-4">
          <div class="flex flex-col sm:flex-row sm:items-center gap-4">
            <div class="flex items-center justify-between lg:hidden">
              <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center">
                  <i data-lucide="plane" class="w-4 h-4 text-white"></i>
                </div>
                <div>
                  <h1 class="font-bold text-base">TripDocs</h1>
                  <p class="text-[10px] text-slate-500 dark:text-slate-400 -mt-0.5">Patel Family · Jun 2026</p>
                </div>
              </div>
              <button id="theme-toggle-mobile" type="button" class="touch-btn p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300" aria-label="Toggle theme">
                <i data-lucide="moon" class="w-5 h-5 theme-icon-dark"></i>
                <i data-lucide="sun" class="w-5 h-5 theme-icon-light hidden"></i>
              </button>
            </div>
            <div class="flex-1 relative max-w-2xl">
              <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
              <input
                id="search-input"
                type="search"
                placeholder="Search documents, references, dates..."
                class="mobile-input w-full pl-10 pr-4 py-3.5 sm:py-3 rounded-2xl bg-slate-100 dark:bg-slate-800 border-0 placeholder:text-slate-400 focus:ring-2 focus:ring-brand-500/40 focus:outline-none transition-shadow"
                autocomplete="off"
              />
            </div>
          </div>
        </div>
      </header>

      <!-- Expense Banner (hidden on summary tab) -->
      <div id="expense-banner" class="px-4 sm:px-6 lg:px-8 pt-4">
        <div class="rounded-2xl bg-gradient-to-br from-brand-600 via-brand-700 to-indigo-800 p-4 sm:p-6 text-white shadow-lg shadow-brand-500/20 relative overflow-hidden">
          <div class="absolute -right-8 -top-8 w-40 h-40 rounded-full bg-white/10 blur-2xl"></div>
          <div class="absolute -left-4 -bottom-4 w-32 h-32 rounded-full bg-indigo-400/20 blur-xl"></div>
          <div class="relative flex flex-col gap-3 sm:gap-4">
            <div>
              <p class="text-brand-100 text-xs sm:text-sm font-medium flex items-center gap-2">
                <i data-lucide="wallet" class="w-4 h-4 shrink-0"></i>
                Total Trip Expenses
              </p>
              <p id="total-expense" class="text-2xl sm:text-3xl lg:text-4xl font-bold tracking-tight mt-1 break-words leading-tight">—</p>

            </div>
            <div id="category-pills" class="pills-scroll flex gap-2 overflow-x-auto pb-0.5 -mx-1 px-1 sm:flex-wrap sm:overflow-visible"></div>
          </div>
        </div>
      </div>

      <!-- Page Content -->

    </div>

    <!-- Mobile Bottom Nav -->
    <nav id="mobile-nav" class="lg:hidden fixed bottom-0 left-0 right-0 z-40 bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_24px_rgba(0,0,0,.08)] dark:shadow-[0_-4px_24px_rgba(0,0,0,.3)]"></nav>
  </div>

  <!-- PDF Preview Modal -->
  <div id="pdf-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop bg-slate-900/60" role="dialog" aria-modal="true" aria-labelledby="pdf-modal-title">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[92vh] overflow-hidden animate-in flex flex-col">
      <div class="flex items-center justify-between p-5 border-b border-slate-100 dark:border-slate-800 shrink-0">
        <div class="min-w-0 pr-4">
          <h2 id="pdf-modal-title" class="font-semibold text-lg truncate">Document Preview</h2>
          <p id="pdf-modal-ref" class="text-xs font-mono text-brand-600 dark:text-brand-400 mt-0.5 truncate"></p>
        </div>
        <button type="button" data-close-modal="pdf-modal" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors shrink-0" aria-label="Close">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-4 flex-1 min-h-0 flex flex-col">
        <iframe id="pdf-preview-frame" class="hidden w-full flex-1 min-h-[50vh] rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800" title="PDF preview"></iframe>

          <p class="text-sm text-slate-500 dark:text-slate-400 text-center px-6">No PDF linked to this document.</p>
        </div>
        <button type="button" id="pdf-download-btn" class="mt-4 w-full py-3 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-medium text-sm flex items-center justify-center gap-2 transition-colors shrink-0">
          <i data-lucide="download" class="w-4 h-4"></i>
          Open / Download PDF
        </button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="edit-sheet fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop bg-slate-900/60" role="dialog" aria-modal="true">
    <div class="edit-sheet-panel bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto animate-in">

        <h2 class="font-semibold text-lg">Edit Document</h2>
        <button type="button" data-close-modal="edit-modal" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Close">

        </button>
      </div>
      <form id="edit-form" class="p-5 space-y-4">
        <input type="hidden" id="edit-id" />
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5" for="edit-title">Title</label>
          <input id="edit-title" type="text" required class="mobile-input w-full px-4 py-3 sm:py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 focus:ring-2 focus:ring-brand-500/40 focus:outline-none" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5" for="edit-date">Date</label>
            <input id="edit-date" type="date" required class="w-full px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 text-sm focus:ring-2 focus:ring-brand-500/40 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5" for="edit-time">Time</label>
            <input id="edit-time" type="time" class="w-full px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 text-sm focus:ring-2 focus:ring-brand-500/40 focus:outline-none" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5" for="edit-amount">Amount</label>
            <input id="edit-amount" type="number" step="0.01" min="0" required class="w-full px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 text-sm focus:ring-2 focus:ring-brand-500/40 focus:outline-none" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5" for="edit-currency">Currency</label>
            <select id="edit-currency" class="w-full px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 text-sm focus:ring-2 focus:ring-brand-500/40 focus:outline-none">
              <option value="SGD">SGD</option>
              <option value="INR">INR</option>
              <option value="USD">USD</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5" for="edit-reference">Booking Reference</label>
          <input id="edit-reference" type="text" required class="w-full px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 text-sm font-mono focus:ring-2 focus:ring-brand-500/40 focus:outline-none" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5" for="edit-status">Status</label>
          <select id="edit-status" class="w-full px-4 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border-0 text-sm focus:ring-2 focus:ring-brand-500/40 focus:outline-none">
            <option value="confirmed">Confirmed</option>
            <option value="upcoming">Upcoming</option>
            <option value="used">Used</option>
            <option value="expired">Expired</option>
          </select>
        </div>
        <button type="submit" class="touch-btn w-full py-3.5 sm:py-3 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-medium text-sm transition-colors">Save Changes</button>
      </form>
    </div>
  </div>

    // ─── State ──────────────────────────────────────────────────────────────
    let activeCategory = 'flights';
    let searchQuery = '';
    let editingDocId = null;

    // ─── Public API: addDocument ────────────────────────────────────────────
    /**
     * Add a new travel document to the organizer.
     * Designed for integration with automated PDF parsing APIs.
     *
     * @param {Object} doc - Document object
     * @param {string} doc.category - 'flights' | 'hotels' | 'tickets' | 'vouchers'
     * @param {string} doc.title - Display title
     * @param {string} doc.date - ISO date (YYYY-MM-DD)
     * @param {string} [doc.time] - HH:mm
     * @param {number} doc.amount - Cost amount
     * @param {string} [doc.currency='SGD'] - Currency code
     * @param {string} doc.reference - Booking/confirmation ID
     * @param {string} [doc.status='confirmed'] - confirmed | upcoming | used | expired
     * @param {string} [doc.pdfUrl] - URL to PDF asset
     * @param {string} [doc.notes] - Additional notes
     * @returns {Object} The created document with generated id
     */
    function addDocument(doc) {
      const required = ['category', 'title', 'date', 'reference'];
      for (const field of required) {
        if (!doc[field]) throw new Error(`addDocument: missing required field "${field}"`);
      }
      if (!CATEGORIES[doc.category] || doc.category === 'summary') {
        throw new Error(`addDocument: invalid category "${doc.category}"`);
      }
      const newDoc = {
        id: doc.id || `${doc.category}-${Date.now()}`,
        category: doc.category,
        title: doc.title,
        date: doc.date,
        time: doc.time || null,
        amount: Number(doc.amount) || 0,
        currency: doc.currency || 'SGD',
        reference: doc.reference,
        status: doc.status || 'confirmed',
        pdfUrl: doc.pdfUrl || null,
        notes: doc.notes || '',
        priceEstimated: doc.priceEstimated || false
      };
      documents.push(newDoc);
      render();
      return newDoc;
    }

    window.addDocument = addDocument;

    // ─── Utilities ──────────────────────────────────────────────────────────
    function formatCurrency(amount, currency = 'SGD') {
      return new Intl.NumberFormat('en-SG', { style: 'currency', currency, minimumFractionDigits: 2 }).format(amount);
    }

    /** Show amount or em dash when missing; * = list price (not on e-voucher PDF). */
    function formatDisplayAmount(doc) {
      if (doc.amount == null || doc.amount <= 0) {
        return { text: '—', title: 'No price on voucher — tap Edit to add', estimated: false };
      }
      return {
        text: formatCurrency(doc.amount, doc.currency) + (doc.priceEstimated ? '*' : ''),
        title: doc.priceEstimated ? 'Public list price — edit if your receipt differs' : '',
        estimated: !!doc.priceEstimated
      };
    }

    function formatDate(dateStr) {
      return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-SG', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }

    function formatTime(timeStr) {
      if (!timeStr) return '';
      const [h, m] = timeStr.split(':');
      const d = new Date();
      d.setHours(+h, +m);
      return d.toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit' });
    }

    function capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function getFilteredDocs(category = activeCategory) {
      if (category === 'summary') return documents;
      return documents.filter(d => {
        const matchCategory = d.category === category;
        const q = searchQuery.toLowerCase().trim();
        if (!q) return matchCategory;
        const searchable = [d.title, d.reference, d.notes, d.date, d.status, d.currency, String(d.amount)].join(' ').toLowerCase();
        return matchCategory && searchable.includes(q);
      });
    }

    function getGlobalFilteredDocs() {
      const q = searchQuery.toLowerCase().trim();
      if (!q) return documents;
      return documents.filter(d => {
        const searchable = [d.title, d.reference, d.notes, d.date, d.status, d.currency, String(d.amount), CATEGORIES[d.category]?.label].join(' ').toLowerCase();
        return searchable.includes(q);
      });
    }

    function getExpensesByCategory() {
      const totals = { flights: 0, hotels: 0, tickets: 0, vouchers: 0 };
      documents.forEach(d => {
        if (totals[d.category] !== undefined) totals[d.category] += d.amount;
      });
      return totals;
    }

    function getTotalExpense() {
      return documents.reduce((sum, d) => sum + d.amount, 0);
    }

    // ─── Theme ────────────────────────────────────────────────────────────────
    function initTheme() {
      const stored = localStorage.getItem('tripdocs-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = stored === 'dark' || (!stored && prefersDark);
      document.documentElement.classList.toggle('dark', isDark);
      updateThemeUI(isDark);
    }

    function toggleTheme() {
      const isDark = !document.documentElement.classList.contains('dark');
      document.documentElement.classList.toggle('dark', isDark);
      localStorage.setItem('tripdocs-theme', isDark ? 'dark' : 'light');
      updateThemeUI(isDark);
      lucide.createIcons();
    }

    function updateThemeUI(isDark) {
      document.querySelectorAll('.theme-icon-dark').forEach(el => el.classList.toggle('hidden', isDark));
      document.querySelectorAll('.theme-icon-light').forEach(el => el.classList.toggle('hidden', !isDark));
      document.querySelectorAll('.theme-label').forEach(el => { el.textContent = isDark ? 'Light mode' : 'Dark mode'; });
    }

    // ─── Navigation ─────────────────────────────────────────────────────────
    function buildNavItems() {
      return Object.values(CATEGORIES).map(cat => ({
        ...cat,
        count: cat.id === 'summary' ? documents.length : documents.filter(d => d.category === cat.id).length
      }));
    }

    function renderNavigation() {
      const items = buildNavItems();
      const desktopNav = document.getElementById('desktop-nav');
      const mobileNav = document.getElementById('mobile-nav');

      desktopNav.innerHTML = items.map(cat => `
        <button type="button" data-category="${cat.id}" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all ${activeCategory === cat.id ? 'active' : ''}">
          <span class="text-lg">${cat.emoji}</span>
          <div class="flex-1 text-left">
            <span class="block">${cat.label}</span>
            <span class="block text-[10px] opacity-70 font-normal">${cat.description}</span>
          </div>
          ${cat.id !== 'summary' ? `<span class="text-xs px-2 py-0.5 rounded-full bg-slate-200/80 dark:bg-slate-700/80">${cat.count}</span>` : ''}
        </button>
      `).join('');

      const mobileLabels = { flights: 'Flights', hotels: 'Hotels', tickets: 'Tickets', vouchers: 'Deals', summary: 'Summary' };
      mobileNav.innerHTML = `
        <div class="mobile-nav-inner flex items-stretch justify-around px-0.5 pt-1.5">
          ${items.map(cat => `
            <button type="button" data-category="${cat.id}" aria-label="${cat.label}" aria-current="${activeCategory === cat.id ? 'page' : 'false'}" class="nav-item flex flex-col items-center justify-center gap-0.5 px-1 rounded-xl min-w-0 flex-1 transition-colors ${activeCategory === cat.id ? 'active' : 'text-slate-500 dark:text-slate-400'}">
              <span class="text-xl leading-none" aria-hidden="true">${cat.emoji}</span>
              <span class="text-[10px] sm:text-[11px] font-semibold leading-tight text-center max-w-[4.5rem] truncate">${mobileLabels[cat.id] || cat.label}</span>
              <span class="nav-dot" aria-hidden="true"></span>
            </button>
          `).join('')}
        </div>
      `;

      document.querySelectorAll('[data-category]').forEach(btn => {
        btn.addEventListener('click', () => setCategory(btn.dataset.category));
      });
    }

    function setCategory(category) {
      activeCategory = category;
      render();
      if (window.matchMedia('(max-width: 1023px)').matches) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

    // ─── Expense Banner ─────────────────────────────────────────────────────
    function renderExpenseBanner() {
      const banner = document.getElementById('expense-banner');
      const isSummary = activeCategory === 'summary';
      banner.classList.toggle('hidden', false);

      const filtered = searchQuery ? getGlobalFilteredDocs() : documents;
      const totalByCurrency = filtered.reduce((acc, d) => {
        acc[d.currency] = (acc[d.currency] || 0) + d.amount;
        return acc;
      }, {});
      const primaryCurrency = totalByCurrency.INR ? 'INR' : 'SGD';
      const total = totalByCurrency[primaryCurrency] || 0;
      const otherCurrencies = Object.entries(totalByCurrency).filter(([c]) => c !== primaryCurrency && totalByCurrency[c] > 0);

      document.getElementById('total-expense').textContent = formatCurrency(total, primaryCurrency) +
        (otherCurrencies.length ? ' +' + otherCurrencies.map(([c, a]) => formatCurrency(a, c)).join(' +') : '');
      document.getElementById('doc-count').textContent = filtered.length;

      const breakdown = getExpensesByCategory();
      const pills = document.getElementById('category-pills');
      pills.innerHTML = Object.entries(breakdown).map(([key, val]) => {
        const catDocs = filtered.filter(d => d.category === key);
        const curr = catDocs.find(d => d.amount > 0)?.currency || 'INR';
        return `
        <span class="inline-flex shrink-0 items-center gap-1.5 px-3 py-1.5 rounded-full bg-white/15 text-xs font-medium backdrop-blur-sm whitespace-nowrap">
          ${CATEGORIES[key].emoji} ${val > 0 ? formatCurrency(val, curr) : '—'}
        </span>`;
      }).join('');
    }

          <div class="p-4 sm:p-5">

              <button type="button" data-action="view-pdf" data-id="${doc.id}" class="touch-btn flex-1 flex items-center justify-center gap-2 py-3 sm:py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm font-medium transition-colors">

                Edit

            </div>

        </article>
      `;
    }

    // ─── Summary View ───────────────────────────────────────────────────────
    function renderSummaryView() {
      const filtered = searchQuery ? getGlobalFilteredDocs() : documents;
      const breakdown = {};
      const breakdownCurrency = {};
      ['flights', 'hotels', 'tickets', 'vouchers'].forEach(k => {
        const catDocs = filtered.filter(d => d.category === k);
        breakdown[k] = catDocs.reduce((s, d) => s + d.amount, 0);
        breakdownCurrency[k] = catDocs.find(d => d.amount > 0)?.currency || 'INR';
      });
      const totalInr = filtered.filter(d => d.currency === 'INR').reduce((s, d) => s + d.amount, 0);
      const maxVal = Math.max(...Object.values(breakdown), 1);

      const statusCounts = filtered.reduce((acc, d) => {
        acc[d.status] = (acc[d.status] || 0) + 1;
        return acc;
      }, {});

      return `
        <div class="space-y-6 animate-in">
          <div>
            <h2 class="text-xl font-bold mb-1">Expense Overview</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400">Complete breakdown of your Singapore trip</p>
          </div>

          <div class="grid sm:grid-cols-2 xl:grid-cols-4 gap-4">
            ${Object.entries(breakdown).map(([key, val]) => `
              <button type="button" data-goto="${key}" class="text-left p-5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-card dark:shadow-card-dark hover:border-brand-300 dark:hover:border-brand-700 transition-colors group">
                <div class="flex items-center justify-between mb-3">
                  <span class="text-2xl">${CATEGORIES[key].emoji}</span>
                  <i data-lucide="arrow-right" class="w-4 h-4 text-slate-300 group-hover:text-brand-500 transition-colors"></i>
                </div>
                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">${CATEGORIES[key].label}</p>
                <p class="text-xl font-bold mt-1">${val > 0 ? formatCurrency(val, breakdownCurrency[key]) : '—'}</p>
                <div class="mt-3 h-1.5 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
                  <div class="h-full rounded-full bg-gradient-to-r from-brand-500 to-brand-600 transition-all" style="width: ${(val / maxVal) * 100}%"></div>
                </div>
              </button>
            `).join('')}
          </div>

          <div class="grid lg:grid-cols-2 gap-6">
            <div class="p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-card dark:shadow-card-dark">
              <h3 class="font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="trending-up" class="w-5 h-5 text-brand-500"></i>
                Grand Total
              </h3>
              <p class="text-2xl sm:text-4xl font-bold text-brand-600 dark:text-brand-400 break-words">${formatCurrency(totalInr, 'INR')}</p>
              <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Across ${filtered.length} documents · * = list price where voucher had no amount</p>
            </div>
            <div class="p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-card dark:shadow-card-dark">
              <h3 class="font-semibold mb-4 flex items-center gap-2">
                <i data-lucide="activity" class="w-5 h-5 text-brand-500"></i>
                Status Breakdown
              </h3>
              <div class="space-y-3">
                ${Object.entries(statusCounts).map(([status, count]) => `
                  <div class="flex items-center justify-between">
                    <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${STATUS_STYLES[status] || ''}">${capitalize(status)}</span>
                    <span class="font-semibold">${count}</span>
                  </div>
                `).join('') || '<p class="text-sm text-slate-400">No documents</p>'}
              </div>
            </div>
          </div>

          <div>
            <h3 class="font-semibold mb-4">All Documents</h3>
            <div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">
              ${filtered.length ? filtered.map(renderDocumentCard).join('') : emptyState('No documents match your search')}
            </div>
          </div>
        </div>
      `;
    }

    function emptyState(message) {
      return `
        <div class="col-span-full flex flex-col items-center justify-center py-16 text-center">
          <div class="w-16 h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-4">
            <i data-lucide="inbox" class="w-8 h-8 text-slate-300 dark:text-slate-600"></i>
          </div>
          <p class="font-medium text-slate-600 dark:text-slate-300">${message}</p>
          <p class="text-sm text-slate-400 mt-1">Try adjusting your search or add new documents</p>
        </div>
      `;
    }

    // ─── Main Render ────────────────────────────────────────────────────────
    function render() {
      renderNavigation();
      renderExpenseBanner();

      const main = document.getElementById('main-content');
      const cat = CATEGORIES[activeCategory];

      if (activeCategory === 'summary') {
        main.innerHTML = renderSummaryView();
      } else {
        const docs = getFilteredDocs(activeCategory);
        main.innerHTML = `
          <div class="animate-in">
            <div class="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between mb-5 sm:mb-6">
              <div>
                <h2 class="text-lg sm:text-xl font-bold flex items-center gap-2">
                  <span>${cat.emoji}</span> ${cat.label}
                </h2>
                <p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400">${cat.description} · ${docs.length} document${docs.length !== 1 ? 's' : ''}</p>
              </div>
              ${docs.length ? `
                <p class="text-sm font-semibold text-brand-600 dark:text-brand-400">
                  ${formatCurrency(docs.reduce((s, d) => s + d.amount, 0), docs.find(d => d.amount > 0)?.currency || 'INR')} subtotal
                </p>
              ` : ''}
            </div>
            <div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-4">
              ${docs.length ? docs.map(renderDocumentCard).join('') : emptyState(searchQuery ? 'No matches found' : 'No documents in this category')}
            </div>
          </div>
        `;
      }

      bindCardActions();
      document.querySelectorAll('[data-goto]').forEach(btn => {
        btn.addEventListener('click', () => setCategory(btn.dataset.goto));
      });

      lucide.createIcons();
    }

    // ─── Modals ─────────────────────────────────────────────────────────────
    function openModal(id) {
      const modal = document.getElementById(id);
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(id) {
      const modal = document.getElementById(id);
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.body.style.overflow = '';
      if (id === 'pdf-modal') {
        document.getElementById('pdf-preview-frame').src = '';
      }
    }

    function openPdfModal(doc) {
      const frame = document.getElementById('pdf-preview-frame');
      const placeholder = document.getElementById('pdf-placeholder');
      document.getElementById('pdf-modal-title').textContent = doc.title;
      document.getElementById('pdf-modal-ref').textContent = doc.reference;

      if (doc.pdfUrl) {
        frame.src = doc.pdfUrl;
        frame.classList.remove('hidden');
        placeholder.classList.add('hidden');
      } else {
        frame.src = '';
        frame.classList.add('hidden');
        placeholder.classList.remove('hidden');
      }

      document.getElementById('pdf-download-btn').onclick = () => {
        if (doc.pdfUrl) window.open(doc.pdfUrl, '_blank');
        else alert(`No PDF file linked for ${doc.reference}.`);
      };
      openModal('pdf-modal');
      lucide.createIcons();
    }

    function openEditModal(doc) {
      editingDocId = doc.id;
      document.getElementById('edit-id').value = doc.id;
      document.getElementById('edit-title').value = doc.title;
      document.getElementById('edit-date').value = doc.date;
      document.getElementById('edit-time').value = doc.time || '';
      document.getElementById('edit-amount').value = doc.amount;
      document.getElementById('edit-currency').value = doc.currency;
      document.getElementById('edit-reference').value = doc.reference;
      document.getElementById('edit-status').value = doc.status;
      openModal('edit-modal');
    }

    function viewPdfInNewTab(doc) {
      if (doc.pdfUrl) {
        window.open(doc.pdfUrl, '_blank', 'noopener,noreferrer');
      } else {
        alert(`No PDF file linked for ${doc.reference}.`);
      }
    }

    function bindCardActions() {
      document.querySelectorAll('[data-action="view-pdf"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const doc = documents.find(d => d.id === btn.dataset.id);
          if (doc) viewPdfInNewTab(doc);
        });
      });
      document.querySelectorAll('[data-action="edit"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const doc = documents.find(d => d.id === btn.dataset.id);
          if (doc) openEditModal(doc);
        });
      });
    }

    // ─── Event Listeners ────────────────────────────────────────────────────
    function initEvents() {
      document.getElementById('search-input').addEventListener('input', e => {
        searchQuery = e.target.value;
        render();
      });

      ['theme-toggle-desktop', 'theme-toggle-mobile'].forEach(id => {
        document.getElementById(id)?.addEventListener('click', toggleTheme);
      });

      document.querySelectorAll('[data-close-modal]').forEach(btn => {
        btn.addEventListener('click', () => closeModal(btn.dataset.closeModal));
      });

      ['pdf-modal', 'edit-modal'].forEach(id => {
        document.getElementById(id).addEventListener('click', e => {
          if (e.target === e.currentTarget) closeModal(id);
        });
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          closeModal('pdf-modal');
          closeModal('edit-modal');
        }
      });

      document.getElementById('edit-form').addEventListener('submit', e => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const doc = documents.find(d => d.id === id);
        if (!doc) return;
        doc.title = document.getElementById('edit-title').value.trim();
        doc.date = document.getElementById('edit-date').value;
        doc.time = document.getElementById('edit-time').value || null;
        doc.amount = parseFloat(document.getElementById('edit-amount').value) || 0;
        doc.currency = document.getElementById('edit-currency').value;
        doc.reference = document.getElementById('edit-reference').value.trim();
        doc.status = document.getElementById('edit-status').value;
        doc.priceEstimated = false;
        closeModal('edit-modal');
        render();
      });
    }

    // ─── Boot ───────────────────────────────────────────────────────────────
    initTheme();
    initEvents();
    render();
    lucide.createIcons();
  </script>
</body>
</html>
